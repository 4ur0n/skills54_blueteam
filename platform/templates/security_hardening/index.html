<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux 安全強化訓練平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --yellow: #e3b341;
      --blue: #58a6ff;
      --purple: #bc8cff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    a { color: var(--blue); }

    /* ── Navbar ── */
    .navbar {
      background: #010409 !important;
      border-bottom: 1px solid var(--border);
    }
    .navbar-brand {
      color: var(--green) !important;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: .5px;
    }

    /* ── Progress bar ── */
    .progress-wrap { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 10px 0; }
    .progress { background: #21262d; height: 8px; }
    .progress-bar { background: var(--green); transition: width .4s; }

    /* ── Challenge cards ── */
    .challenge-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      transition: border-color .2s, transform .15s;
      height: 100%;
    }
    .challenge-card:hover {
      border-color: var(--blue);
      transform: translateY(-2px);
    }
    .challenge-card.passed {
      border-color: var(--green) !important;
    }
    .challenge-card.failed-flash {
      border-color: var(--red) !important;
    }

    .card-num {
      width: 36px; height: 36px;
      background: #21262d;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: .9rem;
      flex-shrink: 0;
    }

    .card-body { padding: 1.1rem; }

    .card-title { font-size: 1rem; font-weight: 700; margin: 0; }

    .badge-category {
      background: #21262d;
      color: var(--muted);
      font-size: .7rem;
      border-radius: 4px;
      padding: 2px 7px;
    }

    .desc { font-size: .85rem; color: var(--muted); line-height: 1.5; }
    .desc code { color: var(--blue); background: #21262d; padding: 1px 4px; border-radius: 3px; }

    /* ── Collapsible sections ── */
    .section-toggle {
      background: none;
      border: none;
      color: var(--blue);
      font-size: .8rem;
      padding: 0;
      cursor: pointer;
      text-decoration: underline;
    }
    .section-content {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      margin-top: 6px;
      font-size: .82rem;
    }
    .section-content code {
      color: var(--yellow);
      background: #21262d;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .access-block {
      font-family: 'Courier New', monospace;
      color: var(--green);
      white-space: pre-wrap;
      font-size: .82rem;
    }

    /* ── Status badge ── */
    .status-badge {
      font-size: .8rem;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
    }
    .status-pending { background: #21262d; color: var(--muted); }
    .status-pass    { background: #1a3a2a; color: var(--green); }
    .status-fail    { background: #3a1a1a; color: var(--red); }

    /* ── Submit button ── */
    .btn-submit {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .85rem;
      border-radius: 6px;
      padding: 5px 16px;
      transition: background .15s, border-color .15s;
    }
    .btn-submit:hover {
      background: #2d333b;
      border-color: var(--blue);
      color: var(--text);
    }
    .btn-submit:disabled {
      opacity: .5;
      cursor: wait;
    }

    /* ── Modal ── */
    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .modal-header { border-bottom: 1px solid var(--border); }
    .modal-footer { border-top: 1px solid var(--border); }

    .check-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      border-radius: 6px;
      background: #0d1117;
      margin-bottom: 6px;
      font-size: .88rem;
    }
    .check-item.ok  { border-left: 3px solid var(--green); }
    .check-item.bad { border-left: 3px solid var(--red); }

    .result-banner {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .result-banner.pass { background: #1a3a2a; color: var(--green); }
    .result-banner.fail { background: #3a1a1a; color: var(--red); }

    /* ── Responsive grid ── */
    @media (max-width: 768px) {
      .challenge-card { margin-bottom: 1rem; }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
  <div class="container">
    <span class="navbar-brand">網路安全競賽訓練平台</span>
    <span style="display:flex; align-items:center; gap:16px;">
      <a href="/" style="color:var(--green); text-decoration:none; font-weight:600; font-size:.9rem;">安全強化</a>
      <a href="/forensics" style="color:var(--muted); text-decoration:none; font-size:.9rem;">封包鑑識</a>
      <a href="/memory" style="color:var(--muted); text-decoration:none; font-size:.9rem;">記憶體鑑識</a>
      <span class="text-muted" style="font-size:.85rem; margin-left:12px;">
        完成：<span id="score">0</span> / {{ challenges|length }}
      </span>
    </span>
  </div>
</nav>

<!-- Progress -->
<div class="progress-wrap">
  <div class="container">
    <div class="progress">
      <div class="progress-bar" id="progress-bar" style="width:0%" role="progressbar"></div>
    </div>
  </div>
</div>

<!-- Main grid -->
<div class="container py-4">
  <div class="row g-3">
    {% for c in challenges %}
    <div class="col-md-6 col-xl-4" id="col-{{ c.id }}">
      <div class="challenge-card d-flex flex-column" id="card-{{ c.id }}">
        <div class="card-body d-flex flex-column gap-2">

          <!-- Header -->
          <div class="d-flex align-items-center gap-2">
            <div class="card-num">{{ c.id }}</div>
            <div>
              <div class="card-title">{{ c.title }}</div>
              <div class="d-flex gap-1 mt-1 flex-wrap">
                <span class="badge-category">{{ c.category }}</span>
                <span class="badge bg-{{ c.difficulty_color }} text-dark" style="font-size:.7rem">{{ c.difficulty }}</span>
              </div>
            </div>
          </div>

          <!-- Description -->
          <p class="desc mb-0">{{ c.description | safe }}</p>

          <!-- Access info -->
          <div>
            <button class="section-toggle" onclick="toggleSection('access-{{ c.id }}')">▸ 連線方式</button>
            <div class="section-content" id="access-{{ c.id }}" style="display:none">
              <pre class="access-block mb-0">{{ c.access }}</pre>
            </div>
          </div>

          <!-- Hints -->
          <div>
            <button class="section-toggle" onclick="toggleSection('hints-{{ c.id }}')">▸ 提示</button>
            <div class="section-content" id="hints-{{ c.id }}" style="display:none">
              <ol class="mb-0 ps-3">
                {% for h in c.hints %}
                <li class="mb-1">{{ h | safe }}</li>
                {% endfor %}
              </ol>
            </div>
          </div>

          <!-- Footer: status + submit -->
          <div class="d-flex justify-content-between align-items-center mt-auto pt-2"
               style="border-top:1px solid var(--border)">
            <span class="status-badge status-pending" id="status-{{ c.id }}">⏳ 待完成</span>
            <button class="btn-submit" id="btn-{{ c.id }}"
                    onclick="submitChallenge({{ c.id }})">
              提交驗證
            </button>
          </div>

        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- Result Modal -->
<div class="modal fade" id="resultModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">驗證結果</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const modal = new bootstrap.Modal(document.getElementById('resultModal'));
  const passedSet = new Set();
  const totalChallenges = {{ challenges | length }};

  function toggleSection(id) {
    const el = document.getElementById(id);
    if (el.style.display === 'none') {
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function updateProgress() {
    const count = passedSet.size;
    document.getElementById('score').textContent = count;
    const pct = Math.round(count / totalChallenges * 100);
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  async function submitChallenge(id) {
    const btn = document.getElementById('btn-' + id);
    const statusEl = document.getElementById('status-' + id);
    const card = document.getElementById('card-' + id);

    btn.disabled = true;
    btn.textContent = '驗證中…';
    statusEl.className = 'status-badge status-pending';
    statusEl.textContent = '⏳ 驗證中…';

    try {
      const resp = await fetch('/api/verify/' + id, { method: 'POST' });
      const data = await resp.json();

      renderResult(id, data);
    } catch (e) {
      renderResult(id, { passed: false, checks: { '網路錯誤': false } });
    } finally {
      btn.disabled = false;
      btn.textContent = '提交驗證';
    }
  }

  function renderResult(id, data) {
    const statusEl = document.getElementById('status-' + id);
    const card = document.getElementById('card-' + id);
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');

    if (data.passed) {
      statusEl.className = 'status-badge status-pass';
      statusEl.textContent = '✅ 已通過';
      card.classList.add('passed');
      card.classList.remove('failed-flash');
      passedSet.add(id);
    } else {
      statusEl.className = 'status-badge status-fail';
      statusEl.textContent = '❌ 未通過';
      card.classList.remove('passed');
      card.classList.add('failed-flash');
      setTimeout(() => card.classList.remove('failed-flash'), 1500);
      passedSet.delete(id);
    }
    updateProgress();

    // Build modal content
    const banner = `<div class="result-banner ${data.passed ? 'pass' : 'fail'}">
      ${data.passed ? '🎉 挑戰通過！' : '❌ 尚未完成，繼續加油！'}
    </div>`;

    let items = '';
    for (const [label, ok] of Object.entries(data.checks || {})) {
      const cls = ok ? 'ok' : 'bad';
      const icon = ok ? '✅' : '❌';
      items += `<div class="check-item ${cls}"><span>${icon}</span><span>${label}</span></div>`;
    }

    modalTitle.textContent = `題目 ${id} — 驗證結果`;
    modalBody.innerHTML = banner + items;
    modal.show();
  }
</script>
</body>
</html>
