<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>封包鑑識練習平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117; --card-bg: #161b22; --border: #30363d;
      --text: #c9d1d9; --muted: #8b949e; --green: #3fb950;
      --red: #f85149; --yellow: #e3b341; --blue: #58a6ff; --purple: #bc8cff;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; }
    a { color: var(--blue); }

    .navbar { background: #010409 !important; border-bottom: 1px solid var(--border); }
    .navbar-brand { color: var(--green) !important; font-weight: 700; font-size: 1.3rem; }

    .progress-wrap { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 10px 0; }
    .progress { background: #21262d; height: 8px; }
    .progress-bar { background: var(--green); transition: width .4s; }

    .q-card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; margin-bottom: 16px;
      transition: border-color .3s;
    }
    .q-card.correct { border-color: var(--green); }
    .q-card.wrong { border-color: var(--red); }

    .q-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
    .q-points { color: var(--muted); font-size: .85rem; }
    .q-hint { color: var(--yellow); font-size: .85rem; margin-top: 6px; display: none; }
    .q-hint.show { display: block; }

    .q-input {
      background: #0d1117; border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 8px 12px; width: 100%; margin-top: 10px;
      font-family: 'Fira Code', monospace;
    }
    .q-input:focus { outline: none; border-color: var(--blue); }
    .q-input:disabled { opacity: .6; }

    .btn-row { display: flex; gap: 8px; margin-top: 10px; }

    .btn-submit {
      background: var(--blue); color: #fff; border: none;
      padding: 6px 18px; border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    .btn-submit:hover { opacity: .9; }
    .btn-submit:disabled { opacity: .5; cursor: not-allowed; }

    .btn-hint {
      background: transparent; color: var(--yellow); border: 1px solid var(--yellow);
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: .85rem;
    }
    .btn-hint:hover { background: rgba(227,179,65,.1); }

    .result-icon { font-size: 1.2rem; margin-left: 8px; }

    .score-box {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; text-align: center;
      font-size: 1.1rem; margin-bottom: 16px;
    }
    .score-num { font-size: 2rem; font-weight: 700; color: var(--green); }

    .back-link { color: var(--muted); text-decoration: none; font-size: .9rem; }
    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand">網路安全競賽訓練平台</span>
    <span style="display:flex; align-items:center; gap:16px;">
      <a href="/" style="color:var(--muted); text-decoration:none; font-size:.9rem;">安全強化</a>
      <a href="/forensics" style="color:var(--green); text-decoration:none; font-weight:600; font-size:.9rem;">封包鑑識</a>
      <a href="/memory" style="color:var(--muted); text-decoration:none; font-size:.9rem;">記憶體鑑識</a>
    </span>
  </div>
</nav>

<div class="progress-wrap">
  <div class="container">
    <div class="d-flex justify-content-between mb-1">
      <small class="text-muted">完成進度</small>
      <small class="text-muted"><span id="solved">0</span> / {{ questions|length }} 題（<span id="score">0</span> / <span id="total">0</span> 分）</small>
    </div>
    <div class="progress">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="container py-4">

  <div class="row mb-3">
    <div class="col-md-8">
      <p class="text-muted" style="font-size:.9rem;">
        請用 Wireshark 開啟 <code>forensics/Task_practice.pcapng</code>，分析封包後在下方提交答案。
      </p>
    </div>
    <div class="col-md-4">
      <div class="score-box">
        <div>目前分數</div>
        <div class="score-num" id="scoreDisplay">0</div>
        <div class="text-muted" style="font-size:.85rem;">/ <span id="maxScore">0</span> 分</div>
      </div>
    </div>
  </div>

  {% for qid, q in questions.items() %}
  <div class="q-card" id="card-{{ qid }}">
    <div class="d-flex justify-content-between align-items-start">
      <div>
        <div class="q-title">試題 {{ qid }}：{{ q.title }}</div>
        <div class="q-points">{{ q.points }} 分</div>
      </div>
      <span class="result-icon" id="icon-{{ qid }}"></span>
    </div>

    <div style="color: var(--muted); font-size: .8rem; margin-top: 8px;">{{ q.format }}</div>

    <input type="text" class="q-input" id="input-{{ qid }}"
           placeholder="輸入答案..."
           onkeydown="if(event.key==='Enter') submitAnswer({{ qid }})">

    <div class="btn-row">
      <button class="btn-submit" id="btn-{{ qid }}" onclick="submitAnswer({{ qid }})">提交</button>
      <button class="btn-hint" onclick="toggleHint({{ qid }})">提示</button>
    </div>

    <div class="q-hint" id="hint-{{ qid }}">{{ q.hint }}</div>
  </div>
  {% endfor %}

</div>

<script>
const totalQuestions = {{ questions|length }};
const maxPoints = {{ questions.values()|sum(attribute='points') }};
let currentScore = 0;
let solvedCount = 0;
const solved = new Set();

document.getElementById('total').textContent = maxPoints;
document.getElementById('maxScore').textContent = maxPoints;

async function submitAnswer(qid) {
  if (solved.has(qid)) return;

  const input = document.getElementById(`input-${qid}`);
  const answer = input.value.trim();
  if (!answer) return;

  const btn = document.getElementById(`btn-${qid}`);
  btn.disabled = true;
  btn.textContent = '驗證中...';

  try {
    const resp = await fetch('/api/forensics/verify', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({id: qid, answer: answer})
    });
    const data = await resp.json();
    const card = document.getElementById(`card-${qid}`);
    const icon = document.getElementById(`icon-${qid}`);

    if (data.correct) {
      card.classList.add('correct');
      card.classList.remove('wrong');
      icon.textContent = '\u2705';
      input.disabled = true;
      btn.textContent = '已通過';
      btn.disabled = true;
      currentScore += data.points;
      solvedCount++;
      solved.add(qid);
      updateProgress();
    } else {
      card.classList.add('wrong');
      icon.textContent = '\u274c';
      btn.textContent = '再試一次';
      btn.disabled = false;
      // Shake animation
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'shake .3s';
      setTimeout(() => { card.classList.remove('wrong'); icon.textContent = ''; }, 2000);
    }
  } catch (e) {
    btn.textContent = '錯誤';
    btn.disabled = false;
  }
}

function toggleHint(qid) {
  const hint = document.getElementById(`hint-${qid}`);
  hint.classList.toggle('show');
}

function updateProgress() {
  document.getElementById('solved').textContent = solvedCount;
  document.getElementById('score').textContent = currentScore;
  document.getElementById('scoreDisplay').textContent = currentScore;
  const pct = (solvedCount / totalQuestions) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// Shake animation
const style = document.createElement('style');
style.textContent = `@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
