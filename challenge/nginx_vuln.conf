server {
    listen 8081;
    server_name _;

    # serve static files — autoindex enabled (vulnerability)
    location /data/ {
        alias /var/www/nginx/data/;
        autoindex on;
    }

    # alias path traversal misconfiguration (vulnerability)
    # missing trailing slash on location causes path traversal
    # e.g. /secret../etc/passwd -> /var/www/nginx/../etc/passwd
    location /secret {
        alias /var/www/nginx/;
        autoindex on;
    }
}
